name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm test
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          RESEND_API_KEY: re_dummy_build_key
          RESEND_FROM_EMAIL: SESAF Barbershop <noreply@barber.serignesalioufaye.me>
          ADMIN_EMAIL: admin@example.com
          CRON_SECRET: dummy_cron_secret
          NEXT_PUBLIC_ADMIN_PASSWORD: dummy
          NEXT_PUBLIC_BASE_URL: https://sesaf-barbershop.vercel.app

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t sesaf-barbershop:latest .
